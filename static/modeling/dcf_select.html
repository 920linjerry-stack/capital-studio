<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCF 版本选择 / Choose DCF Version</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .select-shell {
      max-width: 760px;
      margin: 0 auto;
      padding-top: 22px;
    }

    .select-title {
      font-family: "Consolas", monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .select-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 18px;
    }

    .scenario-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .scenario-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 20px;
    }

    .scenario-card.is-disabled {
      background: #1a1d23;
      opacity: 0.72;
    }

    .scenario-card.is-disabled .scenario-value {
      color: var(--text-muted);
    }

    .scenario-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .scenario-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .scenario-badge {
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      font-size: 11px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .scenario-badge.saved {
      color: var(--green);
      border-color: rgba(63, 185, 80, 0.45);
      background: rgba(63, 185, 80, 0.08);
    }

    .scenario-desc {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .scenario-warning {
      border-left: 3px solid var(--gold);
      background: rgba(210, 153, 34, 0.08);
      padding: 8px 10px;
      border-radius: 4px;
    }

    .scenario-value {
      color: var(--accent);
      font-family: "Consolas", monospace;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .scenario-time {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 12px;
    }

    .scenario-actions {
      display: flex;
      justify-content: flex-end;
    }

    .scenario-actions .btn[disabled] {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .select-error {
      color: var(--red);
      border-left: 3px solid var(--red);
      padding: 12px 16px;
      background: rgba(248, 81, 73, 0.08);
      border-radius: 4px;
    }
  </style>
</head>
<body>
<header>
  <div>
    <div class="logo">MODELING STUDIO</div>
    <div class="subtitle">DCF Version Select</div>
  </div>
  <div class="header-right">
    <a href="/" style="color:var(--accent);font-size:12px;text-decoration:none;">Portfolio</a>
  </div>
</header>

<main class="container">
  <section class="select-shell">
    <div class="select-title">DCF 版本选择 / Choose DCF Version</div>
    <div class="select-subtitle" id="select-subtitle">--</div>
    <div id="select-content">
      <div class="card">正在加载...</div>
    </div>
  </section>
</main>

<script src="/static/modeling/js/dcf_select.js"></script>
</body>
</html>
